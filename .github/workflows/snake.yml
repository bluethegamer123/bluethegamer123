name: Generate Random Snake Animation

on:
  schedule:
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. ADIM: Yılanı kandırmak için rastgele veri üreten script
      - name: Generate Random Data for Snake
        run: |
          mkdir -p dist
          cat << 'EOF' > generate-fake-data.js
          const fs = require('fs');
          // Yılan aksiyonunun gerçek veri yerine okuyabileceği sahte bir mock dosyası veya 
          // ortam hazırlığı yapıyoruz. Ancak Platane/snk doğrudan GitHub API'sine bağlandığı için
          // en temiz çözüm, yılan aksiyonuna gitmeden önce API yanıtını manipüle etmektir.
          EOF
          
      # 2. ADIM: Orijinal hareket eden yılanı çalıştırıyoruz 
      # (Kutuları rastgele algılaması için palette ve renk hilesi yapıyoruz)
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#39d353&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      # 3. ADIM: Yılanın bastığı yerleri SVG içinde rastgele konumlara dağıtan sihirli dokunuş
      - name: Randomize SVG Boxes Custom Script
        run: |
          cat << 'EOF' > randomize.js
          const fs = require('fs');
          const file = 'dist/snake.svg';
          if (fs.existsSync(file)) {
            let svg = fs.readFileSync(file, 'utf8');
            
            // SVG içindeki sabit renkli kutuları bulup yerlerini rastgele karıştırıyoruz
            // Böylece yılan eski yerinde hareket etmeye çalışırken tamamen rastgele dağılmış kutular görecek
            svg = svg.replace(/matrix\((.*?)\)/g, () => {
              const randomX = Math.floor(Math.random() * 50) * 12;
              const randomY = Math.floor(Math.random() * 7) * 12;
              return `matrix(1 0 0 1 ${randomX} ${randomY})`;
            });
            
            fs.writeFileSync(file, svg);
          }
          EOF
          node randomize.js

      # 4. ADIM: Sonucu yükle
      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
