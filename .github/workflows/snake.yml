name: Generate Random Snake Animation

on:
  schedule:
    - cron: "* */12 * * *" # Her 12 saatte bir çalışır

  workflow_dispatch: # Manuel tetikleme sağlar

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Random Animated SVG
        run: |
          cat << 'EOF' > generate-snake.js
          const fs = require('fs');
          
          const cols = 53;
          const rows = 7;
          const size = 10;
          const gap = 2;
          const width = cols * (size + gap);
          const height = rows * (size + gap);
          
          let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
          
          // CSS Animasyonları ve Renk Teması (GitHub Dark)
          svg += `
          <style>
            rect { transform-origin: center; }
            .bg { fill: #0d1117; }
            .empty { fill: #161b22; }
            .snake-dot { 
              fill: #39d353; 
              animation: pulse 2s infinite ease-in-out;
            }
            @keyframes pulse {
              0%, 100% { fill: #26a641; opacity: 0.6; }
              50% { fill: #39d353; opacity: 1; }
            }
          </style>
          <rect width="100%" height="100%" class="bg"/>`;

          for (let x = 0; x < cols; x++) {
            for (let y = 0; y < rows; y++) {
              const posX = x * (size + gap);
              const posY = y * (size + gap);
              
              // %15 ihtimalle rastgele yılan/yem yeşili kutu koy, kalanı boş gri olsun
              const isSnake = Math.random() < 0.15;
              const className = isSnake ? 'snake-dot' : 'empty';
              
              // Rastgele animasyon gecikmesi (kutuların aynı anda yanıp sönmemesi için)
              const delay = (Math.random() * 2).toFixed(2);
              const styleAttr = isSnake ? ` style="animation-delay: ${delay}s;"` : '';
              
              svg += `<rect x="${posX}" y="${posY}" width="${size}" height="${size}" rx="2" ry="2" class="${className}"${styleAttr}/>`;
            }
          }
          
          svg += `</svg>`;
          
          if (!fs.existsSync('dist')) fs.mkdirSync('dist');
          fs.writeFileSync('dist/snake.svg', svg);
          EOF
          
          node generate-snake.js

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
