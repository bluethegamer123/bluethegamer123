name: Generate Random Snake Animation

on:
  schedule:
    - cron: "* */12 * * *" # Her 12 saatte bir çalışır
  workflow_dispatch: # Manuel tetikleme sağlar
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. ADIM: GitHub API'sini taklit eden ve rastgele kutu üreten yerel sunucu oluştur
      - name: Start Fake GitHub API Server
        run: |
          cat << 'EOF' > mock-server.js
          const http = require('http');
          
          const server = http.createServer((req, res) => {
            res.setHeader('Content-Type', 'application/json');
            res.setHeader('Access-Control-Allow-Origin', '*');
            
            // Yılan aksiyonunun istediği takvim verisini rastgele oluşturuyoruz
            const contributions = [];
            const today = new Date();
            
            // Son 1 yıl için (365 gün) rastgele katkı sayıları üretiyoruz
            for (let i = 365; i >= 0; i--) {
              const date = new Date(today);
              date.setDate(today.getDate() - i);
              const dateString = date.toISOString().split('T')[0];
              
              // %25 ihtimalle rastgele yoğunlukta (1-10 arası commit) yeşil kutu at, kalanı 0 (gri)
              const count = Math.random() < 0.25 ? Math.floor(Math.random() * 10) + 1 : 0;
              
              contributions.push({
                date: dateString,
                count: count,
                level: count === 0 ? 0 : Math.floor(Math.random() * 4) + 1
              });
            }
            
            // GitHub GraphQL API formatında yanıt dönüyoruz
            const mockResponse = {
              data: {
                user: {
                  contributionsCollection: {
                    contributionCalendar: {
                      weeks: []
                    }
                  }
                }
              }
            };
            
            // Günleri haftalık bloklara böl
            for (let i = 0; i < contributions.length; i += 7) {
              mockResponse.data.user.contributionsCollection.contributionCalendar.weeks.push({
                contributionDays: contributions.slice(i, i + 7)
              });
            }
            
            res.end(JSON.stringify(mockResponse));
          });
          
          server.listen(4000, () => {
            console.log('Fake GitHub API running on port 4000');
          });
          EOF
          node mock-server.js &
          sleep 2 # Sunucunun ayağa kalkması için bekle

      # 2. ADIM: Orijinal yılan aksiyonunu çalıştır (Yerel sunucuyu dinlemesi için proxy ayarı ile)
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        env:
          # Yılan aksiyonunun gerçek GitHub yerine bizim hazırladığımız rastgele sunucuya gitmesini sağlıyoruz
          GITHUB_API_URL: http://localhost:4000
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake.svg?palette=github-dark

      # 3. ADIM: Oluşan kusursuz animasyonu output branch'ine yükle
      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
